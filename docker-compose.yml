services:
  stat:
    build:
      context: ./stat
    environment:
      STAT_PORT: "8002"
      SQLITE_PATH: /data/listenai.db
    volumes:
      - ./data:/data
    networks:
      - listen-ai
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nlp:
    build:
      context: ./nlp
    environment:
      NLP_PORT: "8001"
    networks:
      - listen-ai
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./gateway
    environment:
      GATEWAY_PORT: "8000"
      STAT_URL: http://stat:8002
      NLP_URL: http://nlp:8001
      JWT_SECRET: supersecret
      DEMO_USER: admin
      DEMO_PASS: admin123
    ports:
      - "8000:8000"
    depends_on:
      stat:
        condition: service_healthy
      nlp:
        condition: service_healthy
    networks:
      - listen-ai

  frontend:
    build:
      context: ./frontend
    environment:
      GATEWAY_URL: http://gateway:8000
    ports:
      - "8501:8501"
    depends_on:
      - gateway
    networks:
      - listen-ai

networks:
  listen-ai:
    driver: bridge
